<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #60a5fa;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 14px;
      padding: 8px 10px;
      background: #1e293b;
      border-radius: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
    .dot.connected { background: #22c55e; }
    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #2563eb; }
    input::placeholder { color: #475569; }
    button {
      width: 100%;
      padding: 9px;
      margin-top: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled {
      background: #334155;
      color: #64748b;
      cursor: default;
    }
    .feedback {
      font-size: 11px;
      margin-top: 8px;
      text-align: center;
      min-height: 16px;
    }
    .feedback.ok { color: #22c55e; }
    .feedback.err { color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:18px">&#x2B07;</span>
    <h1>FluxDM</h1>
  </div>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">Checking...</span>
  </div>

  <label>Send URL to FluxDM</label>
  <input type="text" id="urlInput" placeholder="https://example.com/file.zip">
  <button id="sendBtn" disabled>Send to FluxDM</button>
  <div class="feedback" id="feedback"></div>

  <script src="popup.js"></script>
</body>
</html>
